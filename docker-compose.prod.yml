version: "3.9"

services:
  minimarket_postgres_prod:
    image: postgres:15-alpine
    container_name: minimarket_postgres_prod
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    networks:
      - minimarket_internal
    # Sin puertos expuestos — solo accesible dentro de la red Docker

  minimarket_redis_prod:
    image: redis:7-alpine
    container_name: minimarket_redis_prod
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_prod_data:/data
    networks:
      - minimarket_internal

  minimarket_api_prod:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: minimarket_api_prod
    restart: always
    ports:
      - "4000:4000"
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@minimarket_postgres_prod:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@minimarket_redis_prod:6379
      REDIS_HOST: minimarket_redis_prod
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      COOKIE_SECRET: ${COOKIE_SECRET}
      CORS_ORIGINS: ${CORS_ORIGINS}
    depends_on:
      - minimarket_postgres_prod
      - minimarket_redis_prod
    networks:
      - minimarket_internal
      - minimarket_public

  minimarket_web_prod:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        JWT_SECRET: ${JWT_SECRET}
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    container_name: minimarket_web_prod
    restart: always
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      JWT_SECRET: ${JWT_SECRET}
      API_INTERNAL_URL: http://minimarket_api_prod:4000
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    depends_on:
      - minimarket_api_prod
    networks:
      - minimarket_public

  # Reverse proxy: terminates HTTPS for app.<domain> and api.<domain>
  # and forwards traffic internally to the web/api containers.
  # Works behind Cloudflare (recommended: DNS "Full (strict)" mode with
  # Cloudflare Origin CA certs, or "DNS only" grey-cloud mode so Caddy can
  # issue its own Let's Encrypt certs via HTTP-01).
  minimarket_caddy_prod:
    image: caddy:2-alpine
    container_name: minimarket_caddy_prod
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - minimarket_api_prod
      - minimarket_web_prod
    networks:
      - minimarket_public

networks:
  minimarket_internal:
    driver: bridge
    internal: true
  minimarket_public:
    driver: bridge

volumes:
  postgres_prod_data:
  redis_prod_data:
  caddy_data:
  caddy_config:
